<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro · Casa Church</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <header class="top">
    <div class="wrap">
      <div class="topbar">
        <a class="brand" href="index.html">
          <span class="emblem" aria-hidden="true">
            <svg viewBox="0 0 100 100" fill="none" stroke="#d9c6a6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="50" cy="50" r="46" stroke-width="2.5"/>
              <circle cx="50" cy="50" r="38" stroke-width="2.5"/>
              <path d="M27 61 L46 37 L57 49 L69 38 L83 61" stroke-width="4.5"/>
            </svg>
          </span>
          <b>Casa <span>Church</span></b>
        </a>
        <a class="btn" href="index.html"><i class="ti ti-arrow-left"></i>Voltar ao site</a>
      </div>
    </div>
  </header>

  <div class="container" id="app">
    <h1 class="page-title">Faça parte da Casa</h1>
    <p class="page-sub">Leva menos de um minuto. Preencha e seja bem-vindo. 🤍</p>

    <div class="tabs">
      <div class="tab" id="tabVisitante" onclick="trocar('visitante')"><i class="ti ti-door-enter"></i> Sou visitante</div>
      <div class="tab" id="tabMembro" onclick="trocar('membro')"><i class="ti ti-user-plus"></i> Sou membro</div>
    </div>

    <!-- ============ VISITANTE ============ -->
    <form id="formVisitante" class="hidden" onsubmit="enviar(event,'visitante')">
      <div class="field">
        <label>Seu nome <span class="req">*</span></label>
        <input name="nome" required placeholder="Como podemos te chamar?" />
      </div>
      <div class="field">
        <label>WhatsApp <span class="req">*</span></label>
        <input name="whatsapp" required inputmode="tel" placeholder="(00) 00000-0000" />
      </div>
      <div class="field">
        <label>Quantas vezes você já veio à Casa? <span class="req">*</span></label>
        <select name="vezes" required>
          <option value="">Selecione…</option>
          <option>É a minha primeira vez</option>
          <option>2 ou 3 vezes</option>
          <option>Mais de 3 vezes</option>
          <option>Já venho com frequência</option>
        </select>
      </div>
      <div class="field">
        <label>Como você conheceu a Casa?</label>
        <select name="comoConheceu">
          <option value="">Selecione… (opcional)</option>
          <option>Um amigo/familiar me convidou</option>
          <option>Redes sociais (Instagram)</option>
          <option>Passando na rua</option>
          <option>Outro</option>
        </select>
      </div>
      <div class="field">
        <label class="checkbox consent"><input type="checkbox"> <span>Gostaria de receber uma oração ou uma conversa com a equipe pastoral.</span></label>
      </div>
      <div class="field">
        <label class="checkbox consent"><input type="checkbox" name="consent" required> <span>Autorizo a Casa Church a guardar meus dados e me enviar mensagens no WhatsApp. <span class="req">*</span></span></label>
      </div>
      <button class="btn solid block lg" type="submit"><i class="ti ti-check"></i> Enviar</button>
    </form>

    <!-- ============ MEMBRO ============ -->
    <form id="formMembro" class="hidden" onsubmit="enviar(event,'membro')">
      <div class="field">
        <label>Nome completo <span class="req">*</span></label>
        <input name="nome" required placeholder="Seu nome completo" />
      </div>
      <div class="field">
        <label>WhatsApp <span class="req">*</span></label>
        <input name="whatsapp" required inputmode="tel" placeholder="(00) 00000-0000" />
      </div>
      <div class="two">
        <div class="field">
          <label>Data de nascimento</label>
          <input name="nascimento" type="date" />
        </div>
        <div class="field">
          <label>Aceitou Jesus em</label>
          <input name="conversao" type="date" />
        </div>
      </div>
      <div class="field">
        <label>Endereço / bairro</label>
        <input name="endereco" placeholder="Rua, número, bairro" />
      </div>
      <div class="two">
        <div class="field">
          <label>Você é batizado?</label>
          <select name="batizado">
            <option value="">Selecione…</option>
            <option>Sim, já fui batizado</option>
            <option>Ainda não</option>
          </select>
        </div>
        <div class="field">
          <label>É membro há quanto tempo?</label>
          <select name="tempoMembro">
            <option value="">Selecione…</option>
            <option>Estou chegando agora</option>
            <option>Menos de 6 meses</option>
            <option>De 6 meses a 1 ano</option>
            <option>De 1 a 3 anos</option>
            <option>Mais de 3 anos</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Você serve em algum ministério? <span class="req">*</span></label>
        <select name="serve" id="serve" required onchange="toggleMinisterios()">
          <option value="">Selecione…</option>
          <option value="sim">Sim, eu sirvo</option>
          <option value="nao">Ainda não, mas tenho interesse</option>
        </select>
      </div>
      <div class="field hidden" id="boxMinisterios">
        <label>Em qual(is)? (pode marcar mais de um)</label>
        <div class="checks" id="listaMinisterios"></div>
      </div>
      <div class="field">
        <label>Observações</label>
        <textarea name="obs" placeholder="Algo que queira nos contar (opcional)"></textarea>
      </div>
      <div class="field">
        <label class="checkbox consent"><input type="checkbox" name="consent" required> <span>Autorizo a Casa Church a guardar meus dados e me enviar mensagens no WhatsApp. <span class="req">*</span></span></label>
      </div>
      <button class="btn solid block lg" type="submit"><i class="ti ti-check"></i> Concluir cadastro</button>
    </form>

    <!-- ============ SUCESSO ============ -->
    <div id="sucesso" class="success hidden">
      <i class="ti ti-circle-check"></i>
      <h2>Cadastro recebido!</h2>
      <p id="sucessoMsg">Que alegria ter você na Casa. 🤍</p>
      <a class="btn" href="index.html"><i class="ti ti-home"></i> Voltar ao site</a>
      <div class="note"><i class="ti ti-shield-check"></i> Seus dados foram guardados com segurança e ficam visíveis só para a liderança da igreja.</div>
    </div>
  </div>

  <script src="config.js?v=3"></script>
  <script type="module" src="db.js?v=3"></script>
  <script>
    function trocar(tipo){
      const ehV = tipo==="visitante";
      document.getElementById("tabVisitante").classList.toggle("active", ehV);
      document.getElementById("tabMembro").classList.toggle("active", !ehV);
      document.getElementById("formVisitante").classList.toggle("hidden", !ehV);
      document.getElementById("formMembro").classList.toggle("hidden", ehV);
    }

    function toggleMinisterios(){
      const mostra = document.getElementById("serve").value === "sim";
      document.getElementById("boxMinisterios").classList.toggle("hidden", !mostra);
    }

    async function enviar(e, tipo){
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const dados = Object.fromEntries(new FormData(e.target).entries());
      if(tipo==="membro"){
        dados.ministerios = [...e.target.querySelectorAll('input[name=ministerio]:checked')].map(c=>c.value);
        delete dados.ministerio;
      }
      dados.tipo = tipo;
      dados.quando = new Date().toISOString();

      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader-2"></i> Enviando…';
      try {
        await window.salvarCadastro(dados);          // salva no banco da igreja
      } catch (err) {
        console.error(err);
        // rede falhou: guarda no aparelho como backup pra não perder o cadastro
        const lista = JSON.parse(localStorage.getItem("casa_cadastros_backup") || "[]");
        lista.push(dados);
        localStorage.setItem("casa_cadastros_backup", JSON.stringify(lista));
      }

      document.getElementById("formVisitante").classList.add("hidden");
      document.getElementById("formMembro").classList.add("hidden");
      document.querySelector(".tabs").classList.add("hidden");
      document.querySelector(".page-sub").classList.add("hidden");
      document.getElementById("sucessoMsg").textContent =
        tipo==="visitante" ? "Que bom ter você aqui! Logo a equipe vai te dar as boas-vindas. 🤍"
                           : "Seu cadastro foi recebido. Que alegria ter você na família! 🤍";
      document.getElementById("sucesso").classList.remove("hidden");
      window.scrollTo({top:0, behavior:"smooth"});
    }

    // abre já na aba certa conforme o botão clicado no site
    const tipoURL = new URLSearchParams(location.search).get("tipo");
    trocar(tipoURL === "membro" ? "membro" : "visitante");
  </script>
  <script type="module">
    // monta as opções de ministério a partir do que o admin cadastrou (banco)
    import { getConfig } from './db.js?v=3';
    const c = await getConfig();
    document.getElementById("listaMinisterios").innerHTML =
      (c.ministerios||[]).map(m=>{ const nome = typeof m==="string" ? m : m.nome;
        return `<label class="checkbox"><input type="checkbox" name="ministerio" value="${nome}"> ${nome}</label>`; }).join("");
  </script>
</body>
</html>
