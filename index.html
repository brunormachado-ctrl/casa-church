<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Church</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0a0e1a" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Casa Church" />
  <meta name="description" content="Casa Church — Comunidade Cristã em Penápolis-SP. Cultos, ministérios e cadastro. Venha como está." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Casa Church — Essa CASA é sua!" />
  <meta property="og:description" content="Comunidade Cristã em Penápolis-SP. Cultos, ministérios e cadastro. Venha como está." />
  <meta property="og:image" content="https://casachurch.app.br/og-image.png" />
  <meta property="og:url" content="https://casachurch.app.br/" />
  <meta property="og:site_name" content="Casa Church" />
  <meta name="twitter:card" content="summary_large_image" />
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Archivo:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
  <header class="top">
    <div class="wrap">
      <div class="topbar">
        <div class="brand">
          <span class="emblem" aria-hidden="true"><img src="logo-emblema.png" alt="Casa Church" /></span>
          <b>Casa <span>Church</span></b>
        </div>
        <a class="btn" href="cadastro.html?tipo=visitante"><i class="ti ti-door-enter"></i>Sou visitante</a>
        <a class="btn solid" href="cadastro.html?tipo=membro"><i class="ti ti-user-plus"></i>Fazer cadastro</a>
      </div>
      <nav class="menu" id="menu"></nav>
    </div>
  </header>

  <section class="hero">
    <span class="arch" aria-hidden="true"></span>
    <span class="glow" aria-hidden="true"></span>
    <img class="herologo" src="logo-completa.png" alt="Casa Church — Comunidade Cristã" />
    <h1 class="abertura" id="abertura"></h1>
    <div class="pill"><span class="dot"></span>Próximo culto:&nbsp;<strong id="nextService">—</strong></div>
  </section>

  <div id="eventBanner"></div>

  <main class="wrap">
    <div class="grid" id="cards"></div>
  </main>

  <footer>
    <div class="wrap foot">
      <div class="foot-brand">
        <span class="emblem" aria-hidden="true"><img src="logo-emblema.png" alt="Casa Church" /></span>
        <b>Casa Church</b>
      </div>
      <div class="foot-links">
        <a id="instaLink" href="#" target="_blank" rel="noopener"><i class="ti ti-brand-instagram"></i>Instagram</a>
        <span class="foot-sep">·</span>
        <a href="admin.html"><i class="ti ti-lock"></i>Área do administrador</a>
      </div>
      <p class="foot-copy" id="footRodape">© Casa Church</p>
    </div>
  </footer>

  <!-- janela (modal) das seções -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this)fecharModal()">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <i class="ti" id="modalIcon" aria-hidden="true"></i>
        <h2 id="modalTitle"></h2>
        <button class="modal-close" onclick="fecharModal()" aria-label="Fechar"><i class="ti ti-x"></i></button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="config.js?v=8"></script>
  <script type="module">
    import { getConfig } from './db.js?v=3';
    const config = await getConfig();
    const wa = config.whatsapp ? `https://wa.me/${config.whatsapp}` : '#';

    // foto/banner no topo (se o admin cadastrou)
    if(config.heroFoto){
      const h = document.querySelector('.hero');
      if(h){ h.style.backgroundImage = 'linear-gradient(rgba(10,14,26,.72), rgba(10,14,26,.90)), url("'+config.heroFoto+'")'; h.style.backgroundSize='cover'; h.style.backgroundPosition='center'; }
    }
    window.copiarPix = function(btn){
      const ch = btn.getAttribute('data-pix') || '';
      const done = ()=>{ btn.innerHTML='<i class="ti ti-check"></i> Copiado!'; setTimeout(()=>btn.innerHTML='<i class="ti ti-copy"></i> Copiar chave PIX', 1800); };
      if(navigator.clipboard){ navigator.clipboard.writeText(ch).then(done).catch(()=>alert('Copie a chave: '+ch)); }
      else alert('Copie a chave: '+ch);
    };

    // ---- frase de abertura (estilo manuscrito + CASA em destaque) ----
    (function(){
      const frase = config.fraseAbertura || "Essa CASA é sua!";
      const m = frase.match(/^(.*?)\bCASA\b(.*)$/i);
      document.getElementById("abertura").innerHTML = m
        ? `<span class="script">${m[1].trim()}</span> <span class="forte">CASA</span> <span class="script">${m[2].trim()}</span>`
        : `<span class="script">${frase}</span>`;
    })();
    document.getElementById("footRodape").textContent = config.rodape;
    if(config.instagram){
      const il = document.getElementById("instaLink");
      il.href = config.instagram.url;
      il.innerHTML = `<i class="ti ti-brand-instagram"></i>@${config.instagram.usuario}`;
    }

    // ---- próximo culto ----
    (function(){
      const agora = new Date();
      const hoje = agora.getDay(), horaAgora = agora.getHours();
      let melhor=null, menorDist=99;
      config.cultos.forEach(c=>{
        let dist = (c.diaSemana - hoje + 7) % 7;
        if(dist===0 && horaAgora >= c.h24) dist = 7;
        if(dist < menorDist){ menorDist=dist; melhor=c; }
      });
      if(melhor){
        const quando = menorDist===0 ? "hoje" : menorDist===1 ? "amanhã" : melhor.dia.toLowerCase();
        document.getElementById("nextService").textContent = `${quando}, ${melhor.hora}`;
      }
    })();

    // ---- banner de evento ----
    if(config.eventoEspecial && config.eventoEspecial.ativo){
      document.getElementById("eventBanner").innerHTML =
        `<div class="event"><i class="ti ti-flame"></i><span><strong>${config.eventoEspecial.titulo}</strong> — ${config.eventoEspecial.texto}</span></div>`;
    }

    // ---- teaser de cada atalho ----
    const teasers = { cultos:"Dias e horários", ministerios:"Conheça e participe", endereco:"Como chegar até nós" };
    function teaser(c){ return teasers[c.tipo] || (c.texto||"Toque para ver"); }

    // ---- conteúdo da janela ----
    function corpoDetalhe(c){
      if(c.tipo==="cultos"){
        const linhas = config.cultos.map(s=>`<div class="row"><b>${s.dia} · ${s.nome}</b><span class="t">${s.hora}</span></div>`).join("");
        const ev = (config.eventoEspecial&&config.eventoEspecial.ativo)
          ? `<div class="modal-note"><i class="ti ti-flame"></i><span><b>${config.eventoEspecial.titulo}</b><br>${config.eventoEspecial.texto}</span></div>` : "";
        return linhas + ev;
      }
      if(c.tipo==="ministerios"){
        const itens = config.ministerios.map((m,i)=>{
          const nome = typeof m==="string" ? m : m.nome;
          return `<button class="min-item" onclick="abrirMinisterio(${i})"><span>${nome}</span><i class="ti ti-chevron-right"></i></button>`;
        }).join("");
        return `<p class="txt">Servir é fazer parte. Toque num ministério pra conhecer:</p>
          <div class="min-lista">${itens}</div>
          <a class="btn solid block" href="cadastro.html?tipo=membro" style="margin-top:18px"><i class="ti ti-user-plus"></i> Quero servir</a>`;
      }
      if(c.tipo==="endereco"){
        const q = encodeURIComponent(c.texto||"");
        return `<iframe class="mapa" style="height:200px" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q=${q}&output=embed"></iframe>
          <p class="txt">${c.texto}</p>
          <a class="btn solid block" target="_blank" rel="noopener" href="https://www.google.com/maps/dir/?api=1&destination=${q}"><i class="ti ti-map-pin"></i> Como chegar</a>`;
      }
      if(c.tipo==="pix"){
        const pix = config.pix||{};
        let corpo = `<p class="txt">${c.texto||""}</p>`;
        if(pix.chave){
          corpo += `<div style="background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:12px;font-family:monospace;font-size:14px;word-break:break-all;margin-bottom:10px">${pix.chave}</div>
            <button class="btn solid block" data-pix="${(pix.chave||'').replace(/"/g,'&quot;')}" onclick="copiarPix(this)"><i class="ti ti-copy"></i> Copiar chave PIX</button>`;
          if(pix.nome) corpo += `<p class="txt" style="margin-top:12px">Favorecido: ${pix.nome}</p>`;
        } else {
          corpo += `<p class="txt">A chave PIX ainda não foi cadastrada.</p>`;
        }
        return corpo;
      }
      return `<p class="txt">${c.texto||""}</p>` +
        (c.botao ? `<a class="btn solid block" target="_blank" rel="noopener" href="${wa}"><i class="ti ti-brand-whatsapp"></i> ${c.botao}</a>` : "");
    }

    // ---- abrir / fechar janela ----
    window.abrirModal = function(id){
      const c = config.cartoes.find(x=>x.id===id);
      if(!c) return;
      document.getElementById("modalIcon").className = "ti " + c.icone;
      document.getElementById("modalTitle").textContent = c.titulo;
      document.getElementById("modalBody").innerHTML = corpoDetalhe(c);
      document.getElementById("modal").classList.add("show");
    };
    window.abrirMinisterio = function(i){
      const m = config.ministerios[i];
      if(!m) return;
      const nome = typeof m==="string" ? m : m.nome;
      const desc = (typeof m==="object" && m.descricao) ? m.descricao : "";
      const fotos = (typeof m==="object" && Array.isArray(m.fotos)) ? m.fotos : [];
      document.getElementById("modalIcon").className = "ti ti-users-group";
      document.getElementById("modalTitle").textContent = nome;
      const galeria = fotos.length ? `<div class="galeria">${fotos.map(f=>`<img src="${f}" alt="${nome}" loading="lazy">`).join("")}</div>` : "";
      document.getElementById("modalBody").innerHTML =
        `${galeria}<p class="txt">${desc||"Em breve mais informações sobre este ministério."}</p>
         <button class="btn block" onclick="abrirModal('ministerios')" style="margin-bottom:8px"><i class="ti ti-arrow-left"></i> Todos os ministérios</button>
         <a class="btn solid block" href="cadastro.html?tipo=membro"><i class="ti ti-user-plus"></i> Quero servir</a>`;
      document.getElementById("modal").classList.add("show");
    };
    window.fecharModal = function(){ document.getElementById("modal").classList.remove("show"); };
    document.addEventListener("keydown", e=>{ if(e.key==="Escape") fecharModal(); });

    // ---- monta o menu (abre janela) e os atalhos ----
    const ativos = config.cartoes.filter(c=>c.ativo);
    const menu = document.getElementById("menu");
    ativos.forEach(c=>{
      const a = document.createElement("a");
      a.href = "#";
      a.innerHTML = `<i class="ti ${c.icone}"></i>${c.titulo}`;
      a.onclick = e=>{ e.preventDefault(); abrirModal(c.id); };
      menu.appendChild(a);
    });

    const cards = document.getElementById("cards");
    ativos.forEach(c=>{
      cards.insertAdjacentHTML("beforeend",
        `<button class="tile" onclick="abrirModal('${c.id}')">
           <span class="ic"><i class="ti ${c.icone}"></i></span>
           <span><span class="tt">${c.titulo}</span><span class="sub">${teaser(c)}</span></span>
           <span class="chev"><i class="ti ti-chevron-right"></i></span>
         </button>`);
    });

    // ---- Solicitações (oração, visita, etc. — configuráveis pelo pastor) ----
    const iconeSolic = id => ({ oracao:'ti-heart', visita:'ti-home' }[id] || 'ti-message-circle');
    (config.solicitacoes||[]).filter(s=>s.ativo).forEach(s=>{
      const ic = iconeSolic(s.id);
      const a = document.createElement("a"); a.href="#";
      a.innerHTML = `<i class="ti ${ic}"></i>${s.label.replace(/^Pedido de /i,'')}`;
      a.onclick = e=>{ e.preventDefault(); abrirSolicitacao(s.id); }; menu.appendChild(a);
      cards.insertAdjacentHTML("beforeend",
        `<button class="tile" onclick="abrirSolicitacao('${s.id}')">
           <span class="ic"><i class="ti ${ic}"></i></span>
           <span><span class="tt">${s.label}</span><span class="sub">${s.pedeEndereco?'Agende com a gente':'Estamos com você'}</span></span>
           <span class="chev"><i class="ti ti-chevron-right"></i></span>
         </button>`);
    });

    window.abrirSolicitacao = function(id){
      const s = (config.solicitacoes||[]).find(x=>x.id===id); if(!s) return;
      const extra = s.pedeEndereco ? `
         <div class="field"><label>É para casa ou empresa?</label><select id="sol_local"><option>Casa</option><option>Empresa</option></select></div>
         <div class="field"><input id="sol_end" placeholder="Endereço (rua, número, bairro)"></div>` : "";
      document.getElementById("modalIcon").className = "ti " + iconeSolic(id);
      document.getElementById("modalTitle").textContent = s.label;
      document.getElementById("modalBody").innerHTML =
        `<p class="txt">${s.pedeEndereco ? 'Preencha pra gente combinar a visita. 🤍' : 'Conta pra gente. Vamos orar por você. 🤍'}</p>
         <div class="field"><input id="sol_nome" placeholder="Seu nome (opcional)"></div>
         <div class="field"><input id="sol_wa" placeholder="WhatsApp / telefone"></div>
         ${extra}
         <div class="field"><textarea id="sol_msg" placeholder="${s.pedeEndereco?'Algo que queira nos contar (opcional)':'Escreva seu pedido…'}" style="min-height:100px"></textarea></div>
         <button class="btn solid block" onclick="enviarSolicitacao(this,'${s.id}')"><i class="ti ti-send"></i> Enviar</button>
         <div style="color:var(--danger);font-size:13px;margin-top:8px;min-height:16px" id="sol_erro"></div>`;
      document.getElementById("modal").classList.add("show");
    };
    window.enviarSolicitacao = async function(btn, id){
      const s = (config.solicitacoes||[]).find(x=>x.id===id) || {};
      const erro = document.getElementById("sol_erro"); erro.textContent="";
      const msg = (document.getElementById("sol_msg").value||"").trim();
      const endEl = document.getElementById("sol_end");
      const end = endEl ? endEl.value.trim() : "";
      if(s.pedeEndereco && !end){ erro.textContent="Por favor, informe o endereço."; return; }
      if(!s.pedeEndereco && !msg){ erro.textContent="Escreva seu pedido."; return; }
      btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Enviando…';
      const dados = {};
      if(s.pedeEndereco){ dados.local = document.getElementById("sol_local").value; dados.endereco = end; }
      const reg = { tipo:id, nome:document.getElementById("sol_nome").value.trim(), whatsapp:document.getElementById("sol_wa").value.trim(), pedido:msg, dados };
      const { error } = await window.sb.from("casa_oracoes").insert(reg);
      if(error){ btn.disabled=false; btn.innerHTML='<i class="ti ti-send"></i> Enviar'; erro.textContent="Não consegui enviar. Tente de novo."; return; }
      document.getElementById("modalBody").innerHTML =
        `<div style="text-align:center;padding:18px 6px">
           <i class="ti ti-circle-check" style="font-size:52px;color:var(--ok)"></i>
           <p class="txt" style="margin-top:12px">Recebemos seu pedido. 🤍<br>Logo a Casa Church entra em contato!</p>
           <button class="btn block" onclick="fecharModal()"><i class="ti ti-home"></i> Voltar</button>
         </div>`;
    };
  </script>
</body>
</html>
